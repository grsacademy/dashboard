<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 설문조사 실시간 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- 헤더 -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📊 교육 만족도 실시간 대시보드</h1>
                <p class="text-slate-500 text-sm" id="lastUpdated">업데이트 중...</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition text-sm font-semibold">
                데이터 새로고침
            </button>
        </div>

        <!-- 요약 카드 -->
        <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-8">
            <!-- 자바스크립트에서 렌더링됨 -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 차트 영역 -->
            <div class="lg:col-span-1 card p-6">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">항목별 역량 분석</h2>
                <canvas id="radarChart"></canvas>
            </div>

            <!-- 주관식 답변 -->
            <div class="lg:col-span-2 card p-6">
                <h2 class="text-lg font-semibold mb-4 text-slate-700">주관식 답변 및 건의사항</h2>
                <div class="overflow-y-auto max-h-[500px]" id="feedbackList">
                    <!-- 자바스크립트에서 렌더링됨 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT0n1KkMN_pVYssQx3jKl1dfl3FTk8BAa5xtSYFAcboi5knQ6W8yG5utbdzoY6H5t1r2Wm_zeqSjAyD/pub?output=csv";
        let myChart = null;

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    header: true,
                    complete: function(results) {
                        processData(results.data);
                    }
                });
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                alert("데이터를 가져오는 데 실패했습니다.");
            }
        }

        function processData(data) {
            // 빈 데이터 필터링
            const cleanData = data.filter(row => row['타임스태프']);
            
            const keys = ["전체만족도", "커리큘럼", "자료제공", "실습기회제공", "강사역량", "강의장 청결", "실습장청결", "기숙사 사용"];
            const averages = {};

            keys.forEach(key => {
                const sum = cleanData.reduce((acc, row) => acc + (parseFloat(row[key]) || 0), 0);
                averages[key] = (sum / cleanData.length).toFixed(1);
            });

            renderStats(averages);
            renderChart(averages);
            renderFeedback(cleanData);
            
            document.getElementById('lastUpdated').innerText = `마지막 업데이트: ${new Date().toLocaleTimeString()} (총 ${cleanData.length}명 참여)`;
        }

        function renderStats(averages) {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            
            Object.entries(averages).forEach(([key, value]) => {
                const card = document.createElement('div');
                card.className = 'card p-4 text-center';
                card.innerHTML = `
                    <p class="text-xs text-slate-500 mb-1">${key}</p>
                    <p class="text-xl font-bold text-blue-600">${value}</p>
                `;
                grid.appendChild(card);
            });
        }

        function renderChart(averages) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = Object.keys(averages);
            const values = Object.values(averages);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 점수',
                        data: values,
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: 'rgb(37, 99, 235)',
                        pointBackgroundColor: 'rgb(37, 99, 235)',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: { beginAtZero: true, max: 5, ticks: { stepSize: 1 } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderFeedback(data) {
            const list = document.getElementById('feedbackList');
            list.innerHTML = '';

            // 최신순으로 정렬 (역순)
            [...data].reverse().forEach(row => {
                if (row['주관식'] && row['주관식'].trim() !== "") {
                    const item = document.createElement('div');
                    item.className = 'mb-4 p-4 border-l-4 border-blue-500 bg-slate-50 rounded-r-lg';
                    item.innerHTML = `
                        <p class="text-sm text-slate-700">${row['주관식']}</p>
                        <p class="text-xs text-slate-400 mt-2">${row['타임스태프']}</p>
                    `;
                    list.appendChild(item);
                }
            });
        }

        // 초기 실행 및 1분마다 자동 갱신
        fetchData();
        setInterval(fetchData, 60000); 
    </script>
</body>
</html>
