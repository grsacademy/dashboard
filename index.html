<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 설문 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #666; font-size: 14px; }
        .card .value { font-size: 28px; font-weight: bold; color: #2c3e50; }
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #e1e7ff; color: #4c6ef5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 교육 설문 대시보드</h1>
        <button onclick="fetchData()" style="padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #4c6ef5; color: white;">데이터 새로고침</button>
    </div>

    <!-- 요약 카드 -->
    <div class="stats-grid" id="summary-cards">
        <div class="card"><h3>총 응답 수</h3><div class="value" id="total-responses">-</div></div>
        <div class="card"><h3>콘텐츠 만족도 평균</h3><div class="value" id="avg-content">-</div></div>
        <div class="card"><h3>시스템 편의성 평균</h3><div class="value" id="avg-system">-</div></div>
        <div class="card"><h3>보상 만족도 평균</h3><div class="value" id="avg-reward">-</div></div>
    </div>

    <!-- 차트 영역 -->
    <div class="chart-container">
        <div class="card"><canvas id="satisfactionChart"></canvas></div>
        <div class="card"><canvas id="deptChart"></canvas></div>
    </div>

    <!-- 주관식 답변 -->
    <div class="table-container">
        <h3>💬 최근 개선 요구 사항 (주관식)</h3>
        <table id="opinionTable">
            <thead>
                <tr>
                    <th>직무</th>
                    <th>연차</th>
                    <th>주요 의견</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 여기에 구글 시트에서 복사한 CSV URL을 넣으세요.
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0n1KkMN_pVYssQx3jKl1dfl3FTk8BAa5xtSYFAcboi5knQ6W8yG5utbdzoY6H5t1r2Wm_zeqSjAyD/pub?output=csv';

    let satisfactionChart, deptChart;

    async function fetchData() {
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                renderDashboard(results.data);
            }
        });
    }

    function renderDashboard(data) {
        // 1. 기초 데이터 계산
        const total = data.length;
        const avgContent = (data.reduce((acc, row) => acc + Number(row['콘텐츠 만족도'] || 0), 0) / total).toFixed(1);
        const avgSystem = (data.reduce((acc, row) => acc + Number(row['시스템 사용 편의성'] || 0), 0) / total).toFixed(1);
        const avgReward = (data.reduce((acc, row) => acc + Number(row['보상 및 혜택 만족도'] || 0), 0) / total).toFixed(1);

        document.getElementById('total-responses').innerText = total + '명';
        document.getElementById('avg-content').innerText = avgContent + ' / 5.0';
        document.getElementById('avg-system').innerText = avgSystem + ' / 5.0';
        document.getElementById('avg-reward').innerText = avgReward + ' / 5.0';

        // 2. 만족도 차트 (Bar Chart)
        const ctx1 = document.getElementById('satisfactionChart').getContext('2d');
        if(satisfactionChart) satisfactionChart.destroy();
        satisfactionChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['콘텐츠', '시스템', '보상'],
                datasets: [{
                    label: '평균 점수',
                    data: [avgContent, avgSystem, avgReward],
                    backgroundColor: ['#4c6ef5', '#22b8cf', '#fab005']
                }]
            },
            options: { plugins: { title: { display: true, text: '항목별 만족도 (5점 만점)' } } }
        });

        // 3. 직무별 참여 현황 (Pie Chart)
        const deptCounts = {};
        data.forEach(row => { deptCounts[row['직무']] = (deptCounts[row['직무']] || 0) + 1; });
        
        const ctx2 = document.getElementById('deptChart').getContext('2d');
        if(deptChart) deptChart.destroy();
        deptChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: Object.keys(deptCounts),
                datasets: [{
                    data: Object.values(deptCounts),
                    backgroundColor: ['#ff6b6b', '#51cf66', '#339af0', '#cc5de8']
                }]
            },
            options: { plugins: { title: { display: true, text: '직무별 참여 비율' } } }
        });

        // 4. 주관식 답변 테이블
        const tbody = document.querySelector('#opinionTable tbody');
        tbody.innerHTML = '';
        data.slice(-5).reverse().forEach(row => { // 최신 5개만 표시
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="tag">${row['직무']}</span></td>
                <td>${row['연차']}</td>
                <td>${row['기타 의견 및 개선 사항'] || '없음'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 초기 데이터 로드
    fetchData();
    // 1분마다 자동 새로고침
    setInterval(fetchData, 60000);
</script>

</body>
</html>
